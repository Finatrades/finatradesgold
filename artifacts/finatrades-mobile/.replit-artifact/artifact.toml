kind = "mobile"
previewPath = "/mobile/"
title = "Finatrades Mobile"
version = "1.0.0"
id = "artifacts/finatrades-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 26026

[services.development]
run = "pnpm --filter @workspace/finatrades-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finatrades-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/finatrades-mobile", "run", "serve" ]

[services.env]
PORT = "26026"
BASE_PATH = "/mobile/"
