kind = "web"
previewPath = "/b2b/"
title = "Finatrades B2B"
version = "1.0.0"
id = "artifacts/finatrades-b2b"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/b2b/" ]
localPort = 18583

[services.development]
run = "pnpm --filter @workspace/finatrades-b2b run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/finatrades-b2b", "run", "build" ]
publicDir = "artifacts/finatrades-b2b/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18583"
BASE_PATH = "/b2b/"
